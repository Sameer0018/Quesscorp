# Netlify: build & deploy the React frontend (frontend folder)
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA: all routes go to index.html (React Router)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200

# Env for API URL is set in Netlify dashboard (VITE_API_BASE_URL)
